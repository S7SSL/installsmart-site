<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstallSmart CRM Dashboard</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: #333;
    --text: #e8e8e8;
    --text-muted: #888;
    --accent: #6366f1;
    --accent-hover: #818cf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }
  
  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  
  /* Stats bar */
  .stats { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; text-align: center; flex: 1; min-width: 70px; }
  .stat .num { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  
  /* Tabs */
  .tabs { display: flex; gap: 4px; margin: 10px 0; }
  .tab { flex: 1; padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.2s; }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  
  /* Controls */
  .controls { padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .search-box { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 8px; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-muted); }
  
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 12px; color: var(--text-muted); transition: all 0.2s; white-space: nowrap; }
  .filter-btn.active { color: white; border-color: transparent; }
  .filter-btn[data-status="all"].active { background: var(--accent); }
  .filter-btn[data-status="new"].active { background: #6b7280; }
  .filter-btn[data-status="texted"].active { background: #3b82f6; }
  .filter-btn[data-status="replied"].active { background: #22c55e; }
  .filter-btn[data-status="called"].active { background: #f97316; }
  .filter-btn[data-status="booked"].active { background: #a855f7; }
  .filter-btn[data-status="sold"].active { background: #d97706; }

  /* Lead list */
  .lead-list { padding: 8px; }
  .no-results { text-align: center; color: var(--text-muted); padding: 40px; }
  
  /* Lead card */
  .lead-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; transition: border-color 0.2s; }
  .lead-card:hover { border-color: #555; }
  
  .lead-header { padding: 12px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; }
  .lead-main { flex: 1; min-width: 0; }
  .lead-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lead-sub { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .mobile-link { color: #38bdf8; text-decoration: none; }
  .mobile-link:hover { text-decoration: underline; }
  .lead-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .chevron { color: var(--text-muted); font-size: 12px; transition: transform 0.2s; }
  .lead-card.expanded .chevron { transform: rotate(180deg); }
  
  /* Audit issue */
  .audit-badge { display: inline-block; background: #7f1d1d; color: #fca5a5; border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 600; margin-top: 4px; }
  
  /* Status badges */
  .badge { display: inline-block; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-new { background: #374151; color: #d1d5db; }
  .badge-texted { background: #1d3557; color: #93c5fd; }
  .badge-replied { background: #14532d; color: #86efac; }
  .badge-called { background: #7c2d12; color: #fdba74; }
  .badge-booked { background: #3b0764; color: #d8b4fe; }
  .badge-sold { background: #78350f; color: #fcd34d; }
  .badge-dead { background: #1c1c1c; color: #6b7280; border: 1px solid #333; }
  
  /* Expand area */
  .lead-detail { display: none; padding: 0 12px 12px; border-top: 1px solid var(--border); }
  .lead-card.expanded .lead-detail { display: block; }
  
  .detail-section { margin-top: 10px; }
  .detail-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .detail-value { font-size: 13px; color: var(--text); background: var(--surface2); padding: 8px 10px; border-radius: 6px; line-height: 1.5; }
  .detail-value a { color: #38bdf8; }
  
  .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .action-btn { flex: 1; min-width: 80px; padding: 8px 6px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity 0.2s; }
  .action-btn:hover { opacity: 0.8; }
  .btn-called { background: #c2410c; color: white; }
  .btn-booked { background: #7e22ce; color: white; }
  .btn-sold { background: #b45309; color: white; }
  .btn-dead { background: #374151; color: #9ca3af; }
  .btn-replied { background: #15803d; color: white; }
  .btn-texted { background: #1d4ed8; color: white; }
  
  .domain-info { margin-top: 8px; font-size: 12px; color: var(--text-muted); }
  .domain-available { color: #22c55e; }
  .domain-taken { color: #ef4444; }
  
  /* Count badge */
  .count-badge { background: var(--surface3); color: var(--text-muted); border-radius: 10px; padding: 1px 6px; font-size: 11px; margin-left: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ InstallSmart CRM</h1>
  <div class="stats" id="stats-bar">
    <div class="stat"><div class="num" id="stat-total">0</div><div class="label">Total</div></div>
    <div class="stat"><div class="num" id="stat-texted">0</div><div class="label">Texted</div></div>
    <div class="stat"><div class="num" id="stat-replied">0</div><div class="label">Replied</div></div>
    <div class="stat"><div class="num" id="stat-booked">0</div><div class="label">Booked</div></div>
    <div class="stat"><div class="num" id="stat-sold">0</div><div class="label">Sold</div></div>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="no-website" onclick="switchTab('no-website')">🔨 No Website <span class="count-badge" id="tab-count-no-website"></span></div>
    <div class="tab" data-tab="ai-upgrade" onclick="switchTab('ai-upgrade')">🚀 Upgrade Website <span class="count-badge" id="tab-count-ai-upgrade"></span></div>
  </div>
</div>

<div class="controls">
  <input type="search" class="search-box" id="search-box" placeholder="🔍 Search by name or area..." oninput="applyFilters()">
  <div class="filters">
    <button class="filter-btn active" data-status="all" onclick="setStatusFilter('all')">All</button>
    <button class="filter-btn" data-status="new" onclick="setStatusFilter('new')">New</button>
    <button class="filter-btn" data-status="texted" onclick="setStatusFilter('texted')">Texted</button>
    <button class="filter-btn" data-status="replied" onclick="setStatusFilter('replied')">Replied</button>
    <button class="filter-btn" data-status="called" onclick="setStatusFilter('called')">Called</button>
    <button class="filter-btn" data-status="booked" onclick="setStatusFilter('booked')">Booked</button>
    <button class="filter-btn" data-status="sold" onclick="setStatusFilter('sold')">Sold</button>
  </div>
</div>

<div class="lead-list" id="lead-list"></div>

// localStorage overrides keyed by mobile
const OVERRIDES_KEY = 'crm_status_overrides';
function getOverrides() {
  try { return JSON.parse(localStorage.getItem(OVERRIDES_KEY) || '{}'); } catch(e) { return {}; }
}
function saveOverride(mobile, status) {
  const ov = getOverrides();
  ov[mobile] = status;
  localStorage.setItem(OVERRIDES_KEY, JSON.stringify(ov));
}

// Merge overrides into data
function getData() {
  const ov = getOverrides();
  return RAW_DATA.map(d => {
    const status = ov[d.mobile] || d.status || 'new';
    return {...d, status};
  });
}

// Determine tab for a lead
function getTab(d) {
  if (d.campaign === 'ai-upgrade') return 'ai-upgrade';
  // no-website: campaign=free-build OR hasWebsite=NO/empty
  if (d.campaign === 'free-build') return 'no-website';
  if (d.hasWebsite === 'NO' || d.hasWebsite === '' || !d.hasWebsite) return 'no-website';
  return 'no-website'; // default
}

let currentTab = 'no-website';
let currentStatus = 'all';
let expandedCard = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  applyFilters();
}

function setStatusFilter(status) {
  currentStatus = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.status === status));
  applyFilters();
}

function statusBadge(status) {
  return `<span class="badge badge-${status}">${status}</span>`;
}

function getActionButtons(mobile, status) {
  const actions = [];
  if (status !== 'replied')  actions.push(`<button class="action-btn btn-replied" onclick="updateStatus('${mobile}','replied',event)">✓ Replied</button>`);
  if (status !== 'called')   actions.push(`<button class="action-btn btn-called"  onclick="updateStatus('${mobile}','called',event)">📞 Called</button>`);
  if (status !== 'booked')   actions.push(`<button class="action-btn btn-booked"  onclick="updateStatus('${mobile}','booked',event)">📅 Booked</button>`);
  if (status !== 'sold')     actions.push(`<button class="action-btn btn-sold"    onclick="updateStatus('${mobile}','sold',event)">💰 Sold</button>`);
  if (status !== 'dead')     actions.push(`<button class="action-btn btn-dead"    onclick="updateStatus('${mobile}','dead',event)">✗ Dead</button>`);
  return actions.join('');
}

function updateStatus(mobile, newStatus, event) {
  event.stopPropagation();
  saveOverride(mobile, newStatus);
  applyFilters();
}

function toggleCard(id) {
  const card = document.getElementById(id);
  if (!card) return;
  const isExpanded = card.classList.contains('expanded');
  // Collapse all
  document.querySelectorAll('.lead-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!isExpanded) card.classList.add('expanded');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(d, idx) {
  const id = 'card-' + idx;
  const auditBadge = d.auditIssue ? `<span class="audit-badge">⚠ ${escHtml(d.auditIssue)}</span>` : '';
  const area = d.area ? `<span>📍 ${escHtml(d.area)}</span>` : '';
  const cat = d.category ? `<span>🔧 ${escHtml(d.category.split(';')[0].trim())}</span>` : '';
  
  const mobileClean = d.mobile.replace(/\s/g, '');
  const waLink = `https://wa.me/${mobileClean.replace('+','')}`;
  
  const domainInfo = d.suggestedDomain ? `
    <div class="domain-info">
      🌐 Suggested domain: <strong>${escHtml(d.suggestedDomain)}</strong>
      ${d.domainAvailable ? '<span class="domain-available">(available ✓)</span>' : '<span class="domain-taken">(taken)</span>'}
    </div>` : '';
  
  const websiteInfo = d.website ? `<div class="detail-section"><div class="detail-label">Current Website</div><div class="detail-value"><a href="${escHtml(d.website)}" target="_blank">${escHtml(d.website)}</a></div></div>` : '';
  
  const auditDetail = d.auditMsg ? `<div class="detail-section"><div class="detail-label">Personalised Message</div><div class="detail-value">${escHtml(d.auditMsg)}</div></div>` : '';
  
  const notesDetail = d.notes ? `<div class="detail-section"><div class="detail-label">Notes</div><div class="detail-value">${escHtml(d.notes)}</div></div>` : '';

  return `
  <div class="lead-card" id="${id}">
    <div class="lead-header" onclick="toggleCard('${id}')">
      <div class="lead-main">
        <div class="lead-name">${escHtml(d.name)}</div>
        <div class="lead-sub">
          <a class="mobile-link" href="tel:${escHtml(d.mobile)}" onclick="event.stopPropagation()">${escHtml(d.mobile)}</a>
          ${area}${cat}
        </div>
        ${auditBadge}
      </div>
      <div class="lead-right">
        ${statusBadge(d.status)}
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="lead-detail">
      <div class="action-buttons">
        ${getActionButtons(d.mobile, d.status)}
      </div>
      ${auditDetail}
      ${websiteInfo}
      ${notesDetail}
      ${domainInfo}
      <div class="detail-section" style="margin-top:8px">
        <a href="${waLink}" target="_blank" style="color:#25d366;font-size:12px;">💬 WhatsApp</a>
      </div>
    </div>
  </div>`;
}

function applyFilters() {
  const data = getData();
  const search = document.getElementById('search-box').value.toLowerCase().trim();
  
  const filtered = data.filter(d => {
    // Tab filter
    if (getTab(d) !== currentTab) return false;
    // Status filter
    if (currentStatus !== 'all' && d.status !== currentStatus) return false;
    // Search
    if (search) {
      const name = (d.name || '').toLowerCase();
      const area = (d.area || '').toLowerCase();
      const mobile = (d.mobile || '').toLowerCase();
      if (!name.includes(search) && !area.includes(search) && !mobile.includes(search)) return false;
    }
    return true;
  });
  
  // Update tab counts (all statuses, just tab filter)
  const tabCounts = {'no-website': 0, 'ai-upgrade': 0};
  data.forEach(d => { tabCounts[getTab(d)] = (tabCounts[getTab(d)] || 0) + 1; });
  document.getElementById('tab-count-no-website').textContent = tabCounts['no-website'] || 0;
  document.getElementById('tab-count-ai-upgrade').textContent = tabCounts['ai-upgrade'] || 0;
  
  // Stats for current tab
  const tabData = data.filter(d => getTab(d) === currentTab);
  document.getElementById('stat-total').textContent = tabData.length;
  document.getElementById('stat-texted').textContent = tabData.filter(d => d.status === 'texted').length;
  document.getElementById('stat-replied').textContent = tabData.filter(d => d.status === 'replied').length;
  document.getElementById('stat-booked').textContent = tabData.filter(d => d.status === 'booked').length;
  document.getElementById('stat-sold').textContent = tabData.filter(d => d.status === 'sold').length;
  
  const list = document.getElementById('lead-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">No leads found</div>';
    return;
  }
  
  list.innerHTML = filtered.map((d, i) => renderCard(d, i)).join('');
}

// Init
applyFilters();
</script>
</body>
</html>
