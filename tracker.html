<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bladder Tracking</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 20px; text-align: center; }
.header h1 { font-size: 24px; margin-bottom: 10px; }
.patient-info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 14px; }
.patient-info p { margin: 5px 0; }
.content { padding: 30px 20px; }
.nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; }
.nav-tab { padding: 10px 15px; cursor: pointer; border: none; background: none; font-size: 14px; font-weight: 600; color: #666; border-bottom: 3px solid transparent; transition: all 0.3s; }
.nav-tab.active { color: #667eea; border-bottom-color: #667eea; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.section { margin-bottom: 30px; }
.section h2 { font-size: 18px; color: #333; margin-bottom: 15px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
.stat-box { background: #f0f7ff; padding: 15px; border-radius: 8px; border-left: 4px solid #667eea; }
.stat-label { font-size: 12px; color: #666; margin-bottom: 5px; text-transform: uppercase; }
.stat-value { font-size: 24px; font-weight: 700; color: #667eea; }
.form-group { margin-bottom: 15px; }
label { display: block; font-weight: 600; margin-bottom: 5px; color: #333; font-size: 13px; }
input, select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; }
input:focus, select:focus { outline: none; border-color: #667eea; }
button { padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
button:hover { transform: translateY(-2px); }
.entries { max-height: 400px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; }
.entry { background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-left: 4px solid #667eea; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
.entry-info { flex: 1; }
.entry-time { font-weight: 600; color: #667eea; font-size: 12px; }
.entry-volume { color: #555; font-size: 12px; }
.delete-btn { background: #ff6b6b; padding: 5px 10px; font-size: 11px; }
.ipss-question { background: #f9f9f9; padding: 15px; margin-bottom: 12px; border-left: 4px solid #667eea; border-radius: 4px; }
.ipss-label { font-weight: 600; color: #333; font-size: 13px; margin-bottom: 10px; }
.ipss-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(45px, 1fr)); gap: 8px; }
.ipss-btn { padding: 10px; border: 2px solid #e0e0e0; border-radius: 4px; background: white; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; }
.ipss-btn:hover { border-color: #667eea; }
.ipss-btn.selected { background: #667eea; color: white; border-color: #667eea; }
.ipss-score { background: #f0f7ff; padding: 15px; border-radius: 6px; text-align: center; margin-top: 15px; }
.ipss-total { font-size: 28px; font-weight: 700; color: #667eea; }
.msg { background: #d4edda; color: #155724; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; }
.ipss-history { max-height: 300px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; margin-top: 20px; }
.ipss-entry { background: #f9f9f9; padding: 12px; margin-bottom: 8px; border-left: 4px solid #667eea; border-radius: 4px; }
.ipss-entry-time { font-weight: 600; color: #667eea; font-size: 12px; }
.ipss-entry-score { color: #555; font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Bladder & Urinary Tracking</h1>
<div class="patient-info">
<p><strong>Name:</strong> Satwinder Lally</p>
<p><strong>DOB:</strong> 16/02/1972</p>
<p><strong>Consultant:</strong> Professor Prabhakar Rajan</p>
</div>
</div>
<div class="content">
<div class="nav-tabs">
<button class="nav-tab active" onclick="switchTab('tracking')">Tracking</button>
<button class="nav-tab" onclick="switchTab('ipss')">IPSS</button>
</div>
<div id="tracking" class="tab-content active">
<div class="section">
<h2>Statistics</h2>
<div class="stats">
<div class="stat-box"><div class="stat-label">Total Entries</div><div class="stat-value" id="totalEntries">0</div></div>
<div class="stat-box"><div class="stat-label">Total Urine (ml)</div><div class="stat-value" id="totalVolume">0</div></div>
<div class="stat-box"><div class="stat-label">Average per Void</div><div class="stat-value" id="avgVolume">0</div></div>
<div class="stat-box"><div class="stat-label">With Symptoms</div><div class="stat-value" id="withSymptoms">0</div></div>
</div>
</div>
<div class="section">
<h2>Add Entry</h2>
<div class="form-group">
<label>Date & Time</label>
<input type="datetime-local" id="entryTime">
</div>
<div class="form-group">
<label>Type</label>
<select id="entryType">
<option value="urine">Urination</option>
<option value="intake">Fluid Intake</option>
</select>
</div>
<div class="form-group">
<label>Volume (ml)</label>
<input type="number" id="entryVolume" placeholder="e.g. 180" min="0">
</div>
<div class="form-group">
<label>Description (optional)</label>
<input type="text" id="entryDesc" placeholder="Creatine & Water, etc">
</div>
<button onclick="addEntry()">Add Entry</button>
<div id="addMsg" class="msg"></div>
</div>
<div class="section">
<h2>All Entries</h2>
<div class="entries" id="entriesList"></div>
</div>
</div>
<div id="ipss" class="tab-content">
<div class="section">
<h2>IPSS Questionnaire</h2>
<div id="ipssQuestions"></div>
<div class="ipss-score">
<div style="font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 8px;">Total Score</div>
<div class="ipss-total" id="ipssTotal">-</div>
</div>
<button onclick="saveIPSS()" style="width: 100%; margin-top: 15px;">Save IPSS Results</button>
<div id="ipssMsg" class="msg"></div>
</div>
<div class="section">
<h2>IPSS History</h2>
<div class="ipss-history" id="ipssHistory"></div>
</div>
</div>
</div>
</div>
<script>
var defaultEntries = [
{time: '2026-04-20T19:18', type: 'urine', volume: 180, desc: '', id: 1},
{time: '2026-04-20T19:30', type: 'intake', volume: 250, desc: 'Creatine & Water', id: 2},
{time: '2026-04-20T22:55', type: 'urine', volume: 90, desc: '', id: 3},
{time: '2026-04-21T05:10', type: 'urine', volume: 300, desc: '', id: 4},
{time: '2026-04-21T07:54', type: 'urine', volume: 200, desc: '', id: 5},
{time: '2026-04-21T09:20', type: 'urine', volume: 100, desc: '', id: 6},
{time: '2026-04-21T09:46', type: 'intake', volume: 500, desc: 'Voss Water + Neutronic Focus', id: 7},
{time: '2026-04-21T12:13', type: 'urine', volume: 80, desc: '', id: 8}
];
var entries = JSON.parse(localStorage.getItem('entries')) || defaultEntries;
var ipssAnswers = JSON.parse(localStorage.getItem('ipss')) || {};
var ipssHistory = JSON.parse(localStorage.getItem('ipssHistory')) || [];
var ipssQuestions = [
{q: '1. Incomplete emptying: How often have you had a sensation of not emptying your bladder completely?', max: 5},
{q: '2. Frequency: How often have you had to urinate less than every 2 hours?', max: 5},
{q: '3. Intermittency: How often have you had to stop and start again while urinating?', max: 5},
{q: '4. Urgency: How often have you found it difficult to postpone urination?', max: 5},
{q: '5. Weak stream: How often have you had a weak urinary stream?', max: 5},
{q: '6. Straining: How often have you had to strain to start urination?', max: 5},
{q: '7. Nocturia: How many times do you typically get up at night to urinate?', max: 5},
{q: '8. Post-void dribbling: How often have you experienced leakage after you finished urinating?', max: 5}
];
function switchTab(tab) {
document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
document.getElementById(tab).classList.add('active');
document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
event.target.classList.add('active');
if (tab === 'ipss') renderIPSSHistory();
}
function addEntry() {
var time = document.getElementById('entryTime').value;
var type = document.getElementById('entryType').value;
var volume = parseInt(document.getElementById('entryVolume').value);
var desc = document.getElementById('entryDesc').value;
if (!time || !volume) {
alert('Enter date/time and volume');
return;
}
entries.push({time, type, volume, desc, id: Date.now()});
localStorage.setItem('entries', JSON.stringify(entries));
document.getElementById('entryTime').value = '';
document.getElementById('entryVolume').value = '';
document.getElementById('entryDesc').value = '';
document.getElementById('addMsg').textContent = 'Entry added';
document.getElementById('addMsg').style.display = 'block';
setTimeout(() => document.getElementById('addMsg').style.display = 'none', 3000);
updateStats();
renderEntries();
}
function deleteEntry(id) {
entries = entries.filter(e => e.id !== id);
localStorage.setItem('entries', JSON.stringify(entries));
updateStats();
renderEntries();
}
function updateStats() {
var urine = entries.filter(e => e.type === 'urine');
var totalVolume = urine.reduce((a, e) => a + e.volume, 0);
document.getElementById('totalEntries').textContent = entries.length;
document.getElementById('totalVolume').textContent = totalVolume;
document.getElementById('avgVolume').textContent = urine.length > 0 ? Math.round(totalVolume / urine.length) : 0;
document.getElementById('withSymptoms').textContent = entries.filter(e => e.desc && e.desc.length > 0).length;
}
function renderEntries() {
var html = entries.map(e => {
var dt = new Date(e.time).toLocaleString('en-GB');
return '<div class="entry"><div class="entry-info"><div class="entry-time">' + dt + '</div><div class="entry-volume">' + e.type + ': ' + e.volume + 'ml' + (e.desc ? ' (' + e.desc + ')' : '') + '</div></div><button class="delete-btn" onclick="deleteEntry(' + e.id + ')">Delete</button></div>';
}).join('');
document.getElementById('entriesList').innerHTML = html || '<p style="color: #999; text-align: center;">No entries yet</p>';
}
function renderIPSS() {
var html = ipssQuestions.map((q, idx) => {
var opts = Array.from({length: q.max + 1}, (_, i) => {
var selected = ipssAnswers[idx] === i ? 'selected' : '';
return '<button class="ipss-btn ' + selected + '" onclick="setIPSS(' + idx + ', ' + i + ')">' + i + '</button>';
}).join('');
return '<div class="ipss-question"><div class="ipss-label">' + q.q + '</div><div class="ipss-options">' + opts + '</div></div>';
}).join('');
document.getElementById('ipssQuestions').innerHTML = html;
updateIPSSTotal();
}
function setIPSS(q, val) {
ipssAnswers[q] = val;
renderIPSS();
}
function updateIPSSTotal() {
var total = Object.values(ipssAnswers).reduce((a, b) => a + b, 0);
document.getElementById('ipssTotal').textContent = Object.keys(ipssAnswers).length === 8 ? total : '-';
}
function saveIPSS() {
if (Object.keys(ipssAnswers).length !== 8) {
alert('Answer all 8 questions');
return;
}
var total = Object.values(ipssAnswers).reduce((a, b) => a + b, 0);
var timestamp = new Date().toLocaleString('en-GB');
ipssHistory.push({timestamp: timestamp, score: total, answers: JSON.parse(JSON.stringify(ipssAnswers))});
localStorage.setItem('ipssHistory', JSON.stringify(ipssHistory));
document.getElementById('ipssMsg').textContent = 'IPSS score ' + total + ' saved at ' + timestamp;
document.getElementById('ipssMsg').style.display = 'block';
setTimeout(() => document.getElementById('ipssMsg').style.display = 'none', 3000);
renderIPSSHistory();
}
function renderIPSSHistory() {
var html = ipssHistory.map(h => {
return '<div class="ipss-entry"><div class="ipss-entry-time">' + h.timestamp + '</div><div class="ipss-entry-score">Score: ' + h.score + ' / 35</div></div>';
}).reverse().join('');
document.getElementById('ipssHistory').innerHTML = html || '<p style="color: #999; text-align: center;">No saved results yet</p>';
}
updateStats();
renderEntries();
renderIPSS();
renderIPSSHistory();
</script>
</body>
</html>
